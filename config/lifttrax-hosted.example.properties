lifttrax.dataStore=hosted-postgres
lifttrax.auth.mode=local
lifttrax.web.bind=0.0.0.0

# Copy this file to config/lifttrax-hosted.properties and fill in your database values.
lifttrax.hosted.jdbcUrl=jdbc:postgresql://YOUR_HOST:5432/postgres?sslmode=require
lifttrax.hosted.jdbcUser=YOUR_USER
lifttrax.hosted.jdbcPassword=YOUR_PASSWORD
