name: Hosted Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Render/Supabase environment to validate
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      deploy:
        description: Trigger the Render deploy hook after the quality gate
        required: true
        default: false
        type: boolean

jobs:
  build:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify
        run: ./gradlew qualityGate installDist

  deploy:
    name: Render Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: ${{ inputs.deploy }}
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is required for deploy=true." >&2
            exit 1
          fi
          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"

  smoke:
    name: Hosted Smoke
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: ${{ always() && needs.build.result == 'success' && (inputs.deploy == false || needs.deploy.result == 'success') }}
    steps:
      - uses: actions/checkout@v4
      - name: Smoke hosted app
        shell: pwsh
        env:
          LIFTTRAX_HOSTED_BASE_URL: ${{ vars.LIFTTRAX_HOSTED_BASE_URL }}
          LIFTTRAX_HOSTED_SMOKE_SESSION_COOKIE: ${{ secrets.LIFTTRAX_HOSTED_SMOKE_SESSION_COOKIE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LIFTTRAX_HOSTED_BASE_URL)) {
            Write-Host "LIFTTRAX_HOSTED_BASE_URL is not configured; skipping hosted smoke."
            exit 0
          }
          $args = @("-BaseUrl", $env:LIFTTRAX_HOSTED_BASE_URL)
          if (-not [string]::IsNullOrWhiteSpace($env:LIFTTRAX_HOSTED_SMOKE_SESSION_COOKIE)) {
            $args += @("-SessionCookie", $env:LIFTTRAX_HOSTED_SMOKE_SESSION_COOKIE)
          }
          ./scripts/hosted-smoke.ps1 @args
